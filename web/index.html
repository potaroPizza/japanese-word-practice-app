<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="일본어 단어 연습">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- Preload CJK fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Noto Sans KR', 'Noto Sans JP', sans-serif; margin: 0; }
    #loading-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #F5F0FF; display: flex; align-items: center; justify-content: center;
      flex-direction: column; z-index: 9999; transition: opacity 0.3s;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .loading-spinner {
      width: 40px; height: 40px; border: 4px solid #E8E0F0;
      border-top: 4px solid #3949AB; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { margin-top: 16px; color: #3949AB; font-size: 16px; font-weight: 600; }
  </style>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="일본어 단어 연습">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>일본어 단어 연습</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="loading-screen">
    <div class="loading-spinner"></div>
    <div class="loading-text">로딩 중...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      document.fonts.ready.then(function() {
        setTimeout(function() {
          var el = document.getElementById('loading-screen');
          if (el) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 300);
          }
        }, 500);
      });
    });

    // 새 버전 감지 시 자동 새로고침
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('flutter_service_worker.js').then(function(reg) {
        reg.onupdatefound = function() {
          var newWorker = reg.installing;
          newWorker.onstatechange = function() {
            if (newWorker.state === 'activated' && navigator.serviceWorker.controller) {
              window.location.reload();
            }
          };
        };
      });
    }
  </script>
</body>
</html>
